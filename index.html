<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Os</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />

</head>
<body>

    <div class="top-bar">

        <span style="margin-left: 16px;">
            
            🔋 100%

        </span>

        <p style="background-color: rgba(256, 256, 256, 0.25); padding: 4px 12px; border-radius: 16px; cursor: pointer;" id="welcomeopen">

            UltraOs

        </p>

        <p style="margin-right: 16px;"  id="timeElement">

            11/06/2026 3:50 PM

        </p>

    </div>


    <div  id="welcome"  class="welcome">
        <div id="welcomeheader"
            style="width: 100%; display: flex; align-items: center; cursor: move; justify-content: center; margin-top: 8px;">
            <p style="margin: 0px; color: #fff; font-weight: 500">Welcome</p>
        </div>
        

        <h1>UltraOs</h1>

        <p>Hello, I am Gregory and I am a teenager programmer who participate on <a href="https://stardance.hackclub.com/home">Stardance</a>

        <p id="welcomeclose", class="closebutton">Close</p>

    </div>

    <div id="notes" class="welcome" style="display: none; top: 100px; left: 100px; position: absolute; top: 50%; left: 50%; ">
        <div id="notesheader" style="width: 100%; display: flex; cursor: move; justify-content: center;">
            <p>Ultra Notes</p>
        </div>
        <p></p>
        <p id="notesclose" class="closebutton">Close</p>
    </div>

    <div id="desktopApps" style="padding-top: 64px; padding-left: 16px;">
        <div id="notesIcon" onclick="handleIconTap(this)" style="cursor: pointer; text-align: center; padding: 16px; filter: drop-shadow(0 0 8px black); width: fit-content">
            <img src="./notes.jpg" style="width: 64px; height: 64px; border-radius: 16px;">
            <p style="margin: 0px; color: coral; ">Ultra Notes</p>
        </div>
    </div>


    <script src="./script.js"></script>

</body>
</html>
